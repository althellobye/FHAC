    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background:#f0f4fc; min-height:100vh; padding:20px; display:flex; justify-content:center; }
        .app-container { max-width:1300px; width:100%; background:white; border-radius:32px; padding:24px 28px 40px; box-shadow:0 20px 40px rgba(0,0,0,0.06); position:relative; }
        .app-header { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; margin-bottom:12px; border-bottom:1px solid #eef2f6; padding-bottom:16px; }
        .app-title { font-size:2.2rem; font-weight:700; color:#0b1a33; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .app-title small { font-size:0.9rem; font-weight:400; color:#6b7a8f; margin-left:6px; }
        .app-title .version-badge { font-size:0.6rem; background:#e9eff7; color:#4a6885; padding:2px 10px; border-radius:30px; font-weight:400; margin-left:4px; }
        
        .token-section { display:flex; align-items:center; gap:12px; background:#f0f4fe; padding:6px 16px 6px 20px; border-radius:60px; flex-wrap:wrap; }
        .token-section label { font-weight:500; color:#1a2b44; font-size:0.9rem; }
        .token-section input { border:none; background:white; padding:8px 16px; border-radius:40px; width:200px; font-size:0.9rem; outline:1px solid #d9e0e8; }
        .token-section input:focus { outline:2px solid #2d6ff7; }
        .token-section button { background:#1e2f4a; color:white; border:none; padding:8px 20px; border-radius:40px; font-weight:500; cursor:pointer; font-size:0.9rem; }
        .token-section button:hover { background:#0f1e33; }
        .token-status { font-size:0.8rem; padding:4px 14px; border-radius:30px; background:#e3f5eb; color:#1e7b4b; }
        .token-status.error { background:#fde8e8; color:#b33; }
        .token-status.loading { background:#fff3cd; color:#856404; }
        .token-status.saved { background:#d5f0e0; color:#0b5532; }
        .mode-tabs { display:flex; gap:12px; margin:16px 0 20px; border-bottom:2px solid #eef2f6; padding-bottom:6px; }

        .dept-tabs { display:flex; flex-wrap:wrap; gap:6px 8px; margin:6px 0 18px; padding:4px 0 10px; border-bottom:1px dashed #dfe6ef; }

        .dept-tab.active { background:#1f334a; border-color:#1f334a; color:white; }

        .summary-stats { background:#f8faff; padding:12px 20px; border-radius:60px; display:inline-block; margin-bottom:18px; font-weight:500; color:#10304b; border:1px solid #e0e8f2; }
        .summary-stats i { margin-right:10px; color:#2d6ff7; }
        .card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:18px; margin-top:10px; }
        .task-card { background:white; border-radius:20px; padding:18px; box-shadow:0 6px 18px rgba(0,0,0,0.02), 0 0 0 1px #eef2f6; border-left:4px solid #d0dae8; }

        .badge-progress { padding:3px 14px; border-radius:40px; font-size:0.75rem; font-weight:600; }
        .badge-green { background:#d5f0e0; color:#0b5532; }
        .badge-red { background:#ffe4e4; color:#b13a3a; }
        .badge-urgent { background:#ffd9b3; color:#944d0c; }
        .badge-normal { background:#e6edf6; color:#1f3d5c; }
        .card-actions { margin-top:12px; display:flex; justify-content:flex-end; gap:6px; border-top:1px solid #f0f4fa; padding-top:10px; }
        .card-actions button { background:transparent; border:none; cursor:pointer; font-size:0.85rem; padding:4px 12px; border-radius:30px; }
        .delete-btn { color:#b0c0d0; }
        .delete-btn:hover { background:#fee9e9; color:#b33; }
        .edit-btn { color:#6b8bb0; }
        .edit-btn:hover { background:#e9eff7; color:#1f4a7a; }
        .add-btn { display:inline-flex; align-items:center; gap:6px; background:#eef3fc; border:1px dashed #8aa1c0; padding:8px 22px; border-radius:60px; font-weight:500; color:#1a3457; cursor:pointer; margin:12px 0 4px; }
        .add-btn:hover { background:#dfe9f7; border-color:#2d6ff7; }
        .dept-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
        .hidden { display:none !important; }

        .work-card { background:#fafcff; border-radius:20px; padding:20px 22px; box-shadow:0 0 0 1px #e6edf6; transition:0.15s; }
        .work-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.04), 0 0 0 1px #d0dce8; }

        .work-card .work-title i { color:#2d6ff7; font-size:1.0rem; }

        .work-card .work-month-row input[type="month"]:focus { outline:2px solid #2d6ff7; }
        .work-card .work-note-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:4px 16px 4px 18px; margin-bottom:8px; }

        .work-card .work-save-row .save-status { font-size:0.75rem; color:#1e7b4b; margin-left:12px; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.25); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:999; visibility:hidden; opacity:0; transition:0.15s; }
        .modal-overlay.show { visibility:visible; opacity:1; }

        .modal-box h3 { margin-bottom:18px; font-size:1.3rem; }
        .modal-box label { display:block; margin:12px 0 4px; font-weight:500; font-size:0.9rem; }
        .modal-box input, .modal-box select { width:100%; padding:10px 14px; border:1px solid #d4dce8; border-radius:20px; font-size:0.9rem; background:#fafcff; }
        .modal-box .modal-actions { display:flex; gap:12px; margin-top:24px; justify-content:flex-end; }
        .modal-box .modal-actions button { padding:10px 28px; border:none; border-radius:60px; font-weight:500; background:#eef2f6; cursor:pointer; }
        .modal-box .modal-actions .btn-primary { background:#0b1a33; color:white; }

        .update-banner { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1a2b44; color:white; padding:16px 30px; border-radius:60px; box-shadow:0 10px 40px rgba(0,0,0,0.25); display:flex; align-items:center; gap:16px; z-index:1000; max-width:90%; flex-wrap:wrap; justify-content:center; }
        .update-banner .update-icon { background:#ffd93d; color:#1a2b44; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
        .update-banner .update-text { font-size:0.9rem; }
        .update-banner .update-text strong { color:#ffd93d; }
        .update-banner .update-buttons { display:flex; gap:10px; }
        .update-banner .update-buttons button { padding:8px 24px; border:none; border-radius:40px; font-weight:600; cursor:pointer; font-size:0.85rem; }

        @media (max-width:600px) { .update-banner { padding:14px 20px; bottom:10px; } .update-banner .update-text { font-size:0.8rem; } .update-banner .update-buttons button { padding:6px 16px; font-size:0.75rem; } }

</head>
<body>
    <!-- ===== 更新提示浮層 ===== -->
    <div class="update-banner" id="updateBanner" style="display:none;">
        <div class="update-icon"><i class="fas fa-sync-alt fa-fw"></i></div>
        <div class="update-text">
            <strong>有新版本可用！</strong> 版本 <span id="newVersionText"></span>
            <span style="font-size:0.75rem; opacity:0.7; display:block;">點擊更新即可取得最新功能</span>
        </div>
        <div class="update-buttons">
            <button class="btn-update" id="updateNowBtn"><i class="fas fa-download"></i> 立即更新</button>
            <button class="btn-later" id="updateLaterBtn">稍後</button>
        </div>
    </div>

    <div class="app-container">
        <div class="app-header">
            <div class="app-title">
                FHAC <small>· 團隊協作</small>
                <span class="version-badge" id="versionBadge">載入中...</span>
            </div>
            <div class="token-section">
                <label><i class="fas fa-key"></i> Token</label>
                <input type="text" id="tokenInput" placeholder="請輸入您的 GitHub Token" />
                <button id="loadTokenBtn"><i class="fas fa-sync-alt"></i> 載入資料</button>
                <span class="token-status" id="tokenStatus"><i class="fas fa-info-circle"></i> 請輸入 Token</span>
            </div>
        </div>

        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="memo"><i class="fas fa-sticky-note"></i> 備忘錄</button>

        </div>

        <div id="memoSection">

        </div>

    <div class="modal-overlay" id="memoModal">

    </div>

    <div class="modal-overlay" id="deleteModal">

            <h3><i class="fas fa-trash-alt"></i> 刪除項目</h3>
            <p style="color:#4d5f78;">請輸入刪除密碼</p>
            <input type="password" id="deletePassword" placeholder="密碼" style="width:100%; padding:12px; border-radius:30px; border:1px solid #d4dce8;" />
            <div class="modal-actions">
                <button id="deleteModalCancel">取消</button>
                <button class="btn-primary" id="deleteModalConfirm">確認刪除</button>
            </div>
        </div>

    <script>
        // ================================================================
        //  🔥 版本號 - 每次更新時只改這裡！ 🔥
        // ================================================================
        const APP_VERSION = '2026.07.22.011';

        const VERSION_STORAGE_KEY = 'fhac_app_version';

        document.addEventListener('DOMContentLoaded', function() {
            var badge = document.getElementById('versionBadge');
            if (badge) {
                badge.textContent = 'v' + APP_VERSION;
            }
        });

        // ================================================================
        //  版本檢查與更新
        // ================================================================
        function getCurrentVersion() {
            try {
                return localStorage.getItem(VERSION_STORAGE_KEY) || '';
            } catch (e) { return ''; }
        }

        function setCurrentVersion(version) {
            try {
                localStorage.setItem(VERSION_STORAGE_KEY, version);
            } catch (e) {}
        }

        function showUpdateBanner(newVersion) {
            var banner = document.getElementById('updateBanner');
            document.getElementById('newVersionText').textContent = newVersion;
            banner.style.display = 'flex';
        }

        function hideUpdateBanner() {
            document.getElementById('updateBanner').style.display = 'none';
        }

        async function checkForUpdates() {
            try {
                var url = location.href.split('?')[0] + '?v=' + Date.now();
                var htmlResp = await fetch(url, { cache: 'no-store' });
                var html = await htmlResp.text();

                var match = html.match(/const\s+APP_VERSION\s*=\s*['"]([^'"]+)['"]/);
                var serverVersion = match ? match[1] : null;

                if (!serverVersion) {
                    console.log('⚠️ 無法取得伺服器版本號');
                    return;
                }

                var localVersion = getCurrentVersion();

                if (!localVersion || localVersion !== serverVersion) {
                    console.log('📢 發現新版本: ' + serverVersion + ' (目前: ' + (localVersion || '無') + ')');
                    setCurrentVersion(serverVersion);
                    showUpdateBanner(serverVersion);
                } else {
                    console.log('✅ 已是最新版本: ' + serverVersion);
                }
            } catch (err) {
                console.log('⚠️ 版本檢查失敗: ' + err.message);
            }
        }

        function performUpdate() {
            hideUpdateBanner();
            var url = location.href.split('?')[0] + '?v=' + Date.now() + '&force=' + Date.now();
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:20px;background:#f0f4fc;font-family:sans-serif;">' +
                '<div style="font-size:3rem;color:#2d6ff7;"><i class="fas fa-spinner fa-pulse"></i></div>' +
                '<div style="color:#1a2b44;font-size:1.2rem;">🔄 正在更新 FHAC 看板...</div>' +
                '<div style="color:#6b7a8f;font-size:0.9rem;">請稍候，頁面即將自動重新載入</div>' +
                '</div>';
            setTimeout(function() {
                window.location.href = url;
            }, 800);
        }

        // ================================================================

        // ================================================================
        const GITHUB_USER = 'althellobye';
        const GITHUB_REPO = 'FHAC';
        const DATA_FILE = 'data.json';
        const BRANCH = 'main';
        const DELETE_PASSWORD = 'yuki';
        const STORAGE_KEY = 'fhac_github_token';

        const DEPARTMENTS = ['會計部', '總會', '創藝', '寶利', '康盈', '怡樂', '朗程', '寶翠', '青濤', '心悅', '喜悅', '欣悅', '樂膳'];

        // ================================================================
        //  GitHub API
        // ================================================================
        async function fetchDataFromGitHub(token) {
            var url = 'https://api.github.com/repos/' + GITHUB_USER + '/' + GITHUB_REPO + '/contents/' + DATA_FILE + '?ref=' + BRANCH;
            var resp = await fetch(url, {
                headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
            });
            if (!resp.ok) {
                if (resp.status === 404) return null;
                var err = await resp.json().catch(function() { return {}; });
                throw new Error('GitHub API 錯誤 (' + resp.status + '): ' + (err.message || resp.statusText));
            }
            var data = await resp.json();
            var binary = atob(data.content);
            var bytes = new Uint8Array(binary.length);
            for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            var text = new TextDecoder('utf-8').decode(bytes);
            return { sha: data.sha, content: JSON.parse(text) };
        }

        async function saveDataToGitHub(token, data, sha) {
            var url = 'https://api.github.com/repos/' + GITHUB_USER + '/' + GITHUB_REPO + '/contents/' + DATA_FILE + '?ref=' + BRANCH;
            var jsonStr = JSON.stringify(data, null, 2);
            var encoder = new TextEncoder();
            var bytes = encoder.encode(jsonStr);
            var binary = '';
            for (var i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            var content = btoa(binary);

            var payload = {
                message: '更新資料 ' + new Date().toLocaleString(),
                content: content,
                branch: BRANCH
            };
            if (sha) payload.sha = sha;

            try {
                var resp = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'token ' + token,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                });

                if (!resp.ok) {
                    var err = await resp.json().catch(function() { return {}; });
                    if (resp.status === 409) {
                        console.warn('⚠️ 檔案衝突，重新獲取最新版本...');
                        var latest = await fetchDataFromGitHub(token);
                        if (latest) {
                            payload.sha = latest.sha;
                            var retryResp = await fetch(url, {
                                method: 'PUT',
                                headers: {
                                    'Authorization': 'token ' + token,
                                    'Accept': 'application/vnd.github.v3+json',
                                    'Content-Type': 'application/json',
                                },
                                body: JSON.stringify(payload),
                            });
                            if (!retryResp.ok) {
                                var retryErr = await retryResp.json().catch(function() { return {}; });
                                throw new Error('儲存失敗 (' + retryResp.status + '): ' + (retryErr.message || retryResp.statusText));
                            }
                            var result = await retryResp.json();
                            return result.content.sha;
                        } else {
                            delete payload.sha;
                            var retryResp = await fetch(url, {
                                method: 'PUT',
                                headers: {
                                    'Authorization': 'token ' + token,
                                    'Accept': 'application/vnd.github.v3+json',
                                    'Content-Type': 'application/json',
                                },
                                body: JSON.stringify(payload),
                            });
                            if (!retryResp.ok) {
                                var retryErr = await retryResp.json().catch(function() { return {}; });
                                throw new Error('儲存失敗 (' + retryResp.status + '): ' + (retryErr.message || retryResp.statusText));
                            }
                            var result = await retryResp.json();
                            return result.content.sha;
                        }
                    }
                    throw new Error('儲存失敗 (' + resp.status + '): ' + (err.message || resp.statusText));
                }
                var result = await resp.json();
                return result.content.sha;
            } catch (err) {
                throw err;
            }
        }

        // ================================================================
        //  核心資料載入 / 儲存
        // ================================================================
        async function loadData(token, showStatus) {
            if (showStatus !== false) {
                setStatus('<i class="fas fa-spinner fa-pulse"></i> 載入中...', 'loading');
            }
            try {
                var result = await fetchDataFromGitHub(token);
                if (result === null) {
                    memoData = {};
                    for (var d = 0; d < DEPARTMENTS.length; d++) {
                        memoData[DEPARTMENTS[d]] = [];
                    }
                    workProgressData = {};
                    for (var d2 = 0; d2 < PROGRESS_DEPARTMENTS.length; d2++) {
                        var dept = PROGRESS_DEPARTMENTS[d2];
                        workProgressData[dept] = {};
                        var items = getWorkItemsForDept(dept);
                        for (var w = 0; w < items.length; w++) {
                            workProgressData[dept][items[w].id] = { month: '', note: '' };
                        }
                    }
                    if (showStatus !== false) {
                        setStatus('<i class="fas fa-file"></i> 新檔案已建立', '');
                    }
                    await saveAllData(token);
                } else {
                    var parsed = result.content;
                    memoData = parsed.memoData || {};
                    for (var d3 = 0; d3 < DEPARTMENTS.length; d3++) {
                        var dept2 = DEPARTMENTS[d3];
                        if (!memoData[dept2]) memoData[dept2] = [];
                    }
                    workProgressData = parsed.workProgressData || {};
                    for (var d4 = 0; d4 < PROGRESS_DEPARTMENTS.length; d4++) {
                        var dept3 = PROGRESS_DEPARTMENTS[d4];
                        if (!workProgressData[dept3]) {
                            workProgressData[dept3] = {};
                            var items2 = getWorkItemsForDept(dept3);
                            for (var w2 = 0; w2 < items2.length; w2++) {
                                workProgressData[dept3][items2[w2].id] = { month: '', note: '' };
                            }
                        } else {
                            var items3 = getWorkItemsForDept(dept3);
                            for (var w3 = 0; w3 < items3.length; w3++) {
                                var wid = items3[w3].id;
                                if (!workProgressData[dept3][wid]) {
                                    workProgressData[dept3][wid] = { month: '', note: '' };
                                } else if (typeof workProgressData[dept3][wid] === 'string') {
                                    workProgressData[dept3][wid] = { month: workProgressData[dept3][wid], note: '' };
                                }
                            }
                        }
                    }
                    var total = 0;
                    for (var key in memoData) {
                        total += memoData[key].length;
                    }
                    if (showStatus !== false) {
                        setStatus('<i class="fas fa-check-circle"></i> 已載入 (備忘 ' + total + ' 項)', 'saved');
                    }
                }
                refreshAll();
                return true;
            } catch (err) {
                console.error(err);
                if (showStatus !== false) {
                    setStatus('<i class="fas fa-exclamation-circle"></i> ' + err.message, 'error');
                }
                return false;
            }
        }

        async function saveAllData(token) {
            var fullData = { memoData: memoData, workProgressData: workProgressData, updatedAt: new Date().toISOString() };
            try {
                var result = await fetchDataFromGitHub(token);
                var sha = result ? result.sha : null;
                await saveDataToGitHub(token, fullData, sha);
                setStatus('<i class="fas fa-check-circle"></i> 已儲存 (' + new Date().toLocaleTimeString() + ')', 'saved');
                return true;
            } catch (err) {
                console.error(err);
                setStatus('<i class="fas fa-exclamation-circle"></i> ' + err.message, 'error');
                return false;
            }
        }

        async function forceReload() {
            if (githubToken) {
                await loadData(githubToken, false);
                refreshAll();
            }
        }

        function renderProgressCards() {
            var items = getWorkItemsForDept(currentDept);
            if (items.length === 0) {
                progressGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#7a8aa0; padding:40px 0;">' +
                    '<i class="fas fa-info-circle" style="font-size:1.5rem; display:block; margin-bottom:10px;"></i>' +
                    '此部門暫無工作進度項目</div>';
                return;
            }
            var deptData = workProgressData[currentDept] || {};
            var html = '';
            for (var i = 0; i < items.length; i++) {
                var work = items[i];
                var data = deptData[work.id] || { month: '', note: '' };
                var monthVal = data.month || '';
                var noteVal = data.note || '';
                html += '<div class="work-card" data-work-id="' + work.id + '">' +
                    '<div class="work-title"><i class="fas fa-file-invoice"></i> ' + escapeHtml(work.name) + '</div>' +
                    '<div class="work-month-row">' +
                    '<label><i class="far fa-calendar-alt"></i> 處理進度月份</label>' +
                    '<input type="month" class="work-month-input" value="' + monthVal + '" />' +
                    '</div>' +
                    '<div class="work-note-row">' +
                    '<label><i class="fas fa-sticky-note"></i> 備註</label>' +
                    '<input type="text" class="work-note-input" placeholder="輸入備註..." value="' + escapeHtml(noteVal) + '" />' +
                    '</div>' +
                    '<div class="work-save-row">' +
                    '<button class="save-btn" data-work-id="' + work.id + '"><i class="fas fa-save"></i> 儲存</button>' +
                    '<span class="save-status" id="save-status-' + work.id + '"></span>' +
                    '</div></div>';
            }
            progressGrid.innerHTML = html;

            var saveBtns = progressGrid.querySelectorAll('.save-btn');
            for (var j = 0; j < saveBtns.length; j++) {
                saveBtns[j].addEventListener('click', async function() {
                    var workId = this.dataset.workId;
                    var card = this.closest('.work-card');
                    var monthInput = card.querySelector('.work-month-input');
                    var noteInput = card.querySelector('.work-note-input');
                    var statusEl = document.getElementById('save-status-' + workId);

                    var monthVal = monthInput.value.trim();
                    var noteVal = noteInput.value.trim();

                    if (!monthVal) {
                        statusEl.textContent = '⚠️ 請選擇月份';
                        statusEl.style.color = '#b33';
                        return;
                    }

                    if (!workProgressData[currentDept]) workProgressData[currentDept] = {};
                    if (!workProgressData[currentDept][workId]) {
                        workProgressData[currentDept][workId] = { month: '', note: '' };
                    }
                    workProgressData[currentDept][workId].month = monthVal;
                    workProgressData[currentDept][workId].note = noteVal;

                    var ok = await saveAllData(githubToken);
                    if (ok) {
                        statusEl.textContent = '✅ 已儲存';
                        statusEl.style.color = '#1e7b4b';
                        setTimeout(function() { statusEl.textContent = ''; }, 2000);
                    } else {
                        statusEl.textContent = '❌ 儲存失敗';
                        statusEl.style.color = '#b33';
                    }
                });
            }

            var inputs = progressGrid.querySelectorAll('.work-month-input, .work-note-input');
            for (var k = 0; k < inputs.length; k++) {
                inputs[k].addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        var card = this.closest('.work-card');
                        var btn = card.querySelector('.save-btn');
                        if (btn) btn.click();
                    }
                });
            }
        }

            var note = memoNote.value.trim();
            var status = memoStatus.value;
            if (editTarget) {

                for (var i = 0; i < memoData[editTarget.dept].length; i++) {
                    if (memoData[editTarget.dept][i].id === editTarget.item.id) { idx = i; break; }
                }
                if (idx !== -1) {
                    memoData[editTarget.dept][idx] = { id: editTarget.item.id, name: name, progress: progress, note: note || '', status: status };
                }
                editTarget = null;

                memoData[currentDept].push({ id: genId(), name: name, progress: progress, note: note || '', status: status });

        document.getElementById('deleteModalConfirm').addEventListener('click', async function() {

            if (pwd !== DELETE_PASSWORD) {
                alert('❌ 密碼錯誤！');
                deletePassword.value = '';
                return;
            }
            if (!deleteTarget) {
                alert('⚠️ 沒有選取要刪除的項目');
                deleteModal.classList.remove('show');
                return;
            }

            try {
                await forceReload();

                var found = false;
                if (deleteTarget.type === 'memo') {
                    for (var dept in memoData) {
                        for (var i = 0; i < memoData[dept].length; i++) {
                            if (memoData[dept][i].id === deleteTarget.id) { found = true; break; }
                        }
                        if (found) break;
                    }
                }

                if (!found) {
                    alert('⚠️ 該項目可能已被刪除，請重新整理頁面');
                    deleteModal.classList.remove('show');
                    deleteTarget = null;
                    await forceReload();
                    return;
                }

                if (deleteTarget.type === 'memo') {
                    for (var dept2 in memoData) {
                        var newArr = [];
                        for (var i2 = 0; i2 < memoData[dept2].length; i2++) {
                            if (memoData[dept2][i2].id !== deleteTarget.id) newArr.push(memoData[dept2][i2]);
                        }
                        memoData[dept2] = newArr;
                    }
                }

                var ok = await saveAllData(githubToken);

                if (ok) {
                    alert('✅ 刪除成功！');
                } else {
                    alert('❌ 刪除失敗，請重試');
                }

                deleteModal.classList.remove('show');
                deleteTarget = null;
                await forceReload();

            } catch (err) {
                console.error(err);
                alert('❌ 發生錯誤: ' + err.message);
                deleteModal.classList.remove('show');
                deleteTarget = null;
                await forceReload();
            }

            if (!token.startsWith('ghp_') && !token.startsWith('github_pat_')) {
                setStatus('<i class="fas fa-exclamation-circle"></i> Token 格式不對', 'error');
                return;

            githubToken = token;
            saveTokenToStorage(token);
            setStatus('<i class="fas fa-save"></i> Token 已儲存', 'saved');

        tokenInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loadBtn.click();
        });

        // ================================================================
        //  自動載入 + 版本檢查
        // ================================================================
        async function autoLoad() {
            var savedToken = getTokenFromStorage();
            if (savedToken) {
                tokenInput.value = savedToken;
                githubToken = savedToken;
                setStatus('<i class="fas fa-sync-alt fa-pulse"></i> 自動載入中...', 'loading');
                await loadData(savedToken);
            } else {
                setStatus('<i class="fas fa-info-circle"></i> 請輸入 Token 後載入', '');
            }

            setTimeout(function() {
                checkForUpdates();
            }, 2000);
        }

        // ================================================================
        //  更新按鈕事件
        // ================================================================
        document.getElementById('updateNowBtn').addEventListener('click', function() {
            performUpdate();
        });

        document.getElementById('updateLaterBtn').addEventListener('click', function() {
            hideUpdateBanner();
        });

        // ================================================================
        //  初始化
        // ================================================================
        refreshAll();
        autoLoad();

        console.log('✅ FHAC 看板已載入 (v' + APP_VERSION + ')');
        console.log('🟢 App Icon 底色為綠色');
        console.log('🗑️ 安裝引導已完全移除');
    </script>
</body>
</html>
