<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FHAC · 團隊協作看板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== 全部樣式跟之前一樣，省略節省空間 ===== */
        * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background:#f0f4fc; min-height:100vh; padding:20px; display:flex; justify-content:center; }
        .app-container { max-width:1300px; width:100%; background:white; border-radius:32px; padding:24px 28px 40px; box-shadow:0 20px 40px rgba(0,0,0,0.06); }
        .app-header { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; margin-bottom:18px; border-bottom:1px solid #eef2f6; padding-bottom:16px; }
        .app-title { font-size:2.2rem; font-weight:700; color:#0b1a33; display:flex; align-items:center; gap:8px; }
        .app-title small { font-size:0.9rem; font-weight:400; color:#6b7a8f; margin-left:6px; }
        .token-section { display:flex; align-items:center; gap:12px; background:#f0f4fe; padding:6px 16px 6px 20px; border-radius:60px; flex-wrap:wrap; }
        .token-section label { font-weight:500; color:#1a2b44; font-size:0.9rem; }
        .token-section input { border:none; background:white; padding:8px 16px; border-radius:40px; width:220px; font-size:0.9rem; outline:1px solid #d9e0e8; }
        .token-section input:focus { outline:2px solid #2d6ff7; }
        .token-section button { background:#1e2f4a; color:white; border:none; padding:8px 20px; border-radius:40px; font-weight:500; cursor:pointer; font-size:0.9rem; }
        .token-section button:hover { background:#0f1e33; }
        .token-status { font-size:0.8rem; padding:4px 14px; border-radius:30px; background:#e3f5eb; color:#1e7b4b; }
        .token-status.error { background:#fde8e8; color:#b33; }
        .token-status.loading { background:#fff3cd; color:#856404; }
        .mode-tabs { display:flex; gap:12px; margin:20px 0 24px; border-bottom:2px solid #eef2f6; padding-bottom:6px; }
        .mode-tab { padding:10px 28px; border-radius:40px; font-weight:600; background:transparent; border:none; color:#5d6f83; cursor:pointer; font-size:1rem; }
        .mode-tab.active { background:#0b1a33; color:white; }
        .mode-tab i { margin-right:8px; }
        .dept-tabs { display:flex; flex-wrap:wrap; gap:8px 10px; margin:6px 0 18px; padding:4px 0 10px; border-bottom:1px dashed #dfe6ef; }
        .dept-tab { background:white; border:1px solid #d4dce8; padding:6px 22px; border-radius:40px; font-size:0.9rem; font-weight:500; color:#1f334a; cursor:pointer; }
        .dept-tab .count-badge { background:#2d6ff7; color:white; border-radius:20px; padding:0 8px; font-size:0.7rem; margin-left:6px; font-weight:600; }
        .dept-tab.active { background:#1f334a; border-color:#1f334a; color:white; }
        .dept-tab.active .count-badge { background:rgba(255,255,255,0.3); }
        .dept-tab:hover { background:#e9eff7; }
        .dept-tab.active:hover { background:#142433; }
        .summary-stats { background:#f8faff; padding:12px 20px; border-radius:60px; display:inline-block; margin-bottom:18px; font-weight:500; color:#10304b; border:1px solid #e0e8f2; }
        .summary-stats i { margin-right:10px; color:#2d6ff7; }
        .card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:18px; margin-top:10px; }
        .task-card { background:white; border-radius:20px; padding:18px; box-shadow:0 6px 18px rgba(0,0,0,0.02), 0 0 0 1px #eef2f6; border-left:4px solid #d0dae8; }
        .task-card .card-title { font-weight:600; font-size:1.1rem; color:#0b1e30; margin-bottom:8px; }
        .task-card .card-meta { display:flex; flex-wrap:wrap; align-items:center; gap:10px 14px; font-size:0.85rem; color:#2a405c; margin-top:6px; }
        .badge-progress { padding:3px 14px; border-radius:40px; font-size:0.75rem; font-weight:600; }
        .badge-green { background:#d5f0e0; color:#0b5532; }
        .badge-red { background:#ffe4e4; color:#b13a3a; }
        .badge-urgent { background:#ffd9b3; color:#944d0c; }
        .badge-normal { background:#e6edf6; color:#1f3d5c; }
        .card-actions { margin-top:12px; display:flex; justify-content:flex-end; gap:6px; border-top:1px solid #f0f4fa; padding-top:10px; }
        .card-actions button { background:transparent; border:none; cursor:pointer; font-size:0.85rem; padding:4px 12px; border-radius:30px; }
        .delete-btn { color:#b0c0d0; }
        .delete-btn:hover { background:#fee9e9; color:#b33; }
        .edit-btn { color:#6b8bb0; }
        .edit-btn:hover { background:#e9eff7; color:#1f4a7a; }
        .add-btn { display:inline-flex; align-items:center; gap:6px; background:#eef3fc; border:1px dashed #8aa1c0; padding:8px 22px; border-radius:60px; font-weight:500; color:#1a3457; cursor:pointer; margin:12px 0 4px; }
        .add-btn:hover { background:#dfe9f7; border-color:#2d6ff7; }
        .dept-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
        .work-progress-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:18px; margin-top:10px; }
        .work-card { background:#fafcff; border-radius:20px; padding:18px; box-shadow:0 0 0 1px #e6edf6; }
        .work-card .wp-dept { font-weight:600; color:#002856; }
        .work-card .wp-project { font-size:1rem; margin:4px 0; }
        .work-card .wp-meta { font-size:0.8rem; color:#3f5877; }
        .work-card .card-actions { margin-top:10px; padding-top:8px; }
        .hidden { display:none !important; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.25); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:999; visibility:hidden; opacity:0; transition:0.15s; }
        .modal-overlay.show { visibility:visible; opacity:1; }
        .modal-box { background:white; max-width:440px; width:90%; padding:28px 30px; border-radius:40px; box-shadow:0 30px 60px rgba(0,0,0,0.2); }
        .modal-box h3 { margin-bottom:18px; font-size:1.3rem; }
        .modal-box label { display:block; margin:12px 0 4px; font-weight:500; font-size:0.9rem; }
        .modal-box input, .modal-box select { width:100%; padding:10px 14px; border:1px solid #d4dce8; border-radius:20px; font-size:0.9rem; background:#fafcff; }
        .modal-box .modal-actions { display:flex; gap:12px; margin-top:24px; justify-content:flex-end; }
        .modal-box .modal-actions button { padding:10px 28px; border:none; border-radius:60px; font-weight:500; background:#eef2f6; cursor:pointer; }
        .modal-box .modal-actions .btn-primary { background:#0b1a33; color:white; }
        .modal-box .modal-actions .btn-primary:hover { background:#1a3050; }
        .loading-spinner { text-align:center; padding:40px 0; color:#6b7a8f; }
        .loading-spinner i { font-size:2rem; margin-bottom:12px; display:block; }
        @media (max-width:600px) { .app-container { padding:16px; } .token-section { flex-wrap:wrap; } .token-section input { width:100%; } }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 頭部 -->
        <div class="app-header">
            <div class="app-title">FHAC <small>· 團隊協作</small></div>
            <div class="token-section">
                <label><i class="fas fa-key"></i> Token</label>
                <input type="text" id="tokenInput" placeholder="請輸入您的 GitHub Token" />
                <button id="loadTokenBtn"><i class="fas fa-sync-alt"></i> 載入資料</button>
                <span class="token-status" id="tokenStatus"><i class="fas fa-spinner fa-pulse"></i> 請輸入 Token</span>
            </div>
        </div>

        <!-- 模式切換 -->
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="memo"><i class="fas fa-sticky-note"></i> 備忘錄</button>
            <button class="mode-tab" data-mode="progress"><i class="fas fa-chart-line"></i> 工作進度</button>
        </div>

        <!-- 備忘錄 -->
        <div id="memoSection">
            <div class="dept-tabs" id="deptTabs"></div>
            <div class="dept-header">
                <div class="summary-stats" id="deptSummary"><i class="fas fa-list-ul"></i> 總計 0 項</div>
                <button class="add-btn" id="addMemoBtn"><i class="fas fa-plus-circle"></i> 新增項目</button>
            </div>
            <div id="memoCardGrid"><div class="loading-spinner"><i class="fas fa-cloud-upload-alt"></i>請輸入 Token 後點擊「載入資料」</div></div>
        </div>

        <!-- 工作進度 -->
        <div id="progressSection" class="hidden">
            <div style="display:flex; justify-content:flex-end; margin-bottom:16px;">
                <button class="add-btn" id="addProgressBtn"><i class="fas fa-plus-circle"></i> 新增工作進度</button>
            </div>
            <div id="progressGrid"><div class="loading-spinner"><i class="fas fa-cloud-upload-alt"></i>請輸入 Token 後點擊「載入資料」</div></div>
        </div>
    </div>

    <!-- 模態框：備忘錄 -->
    <div class="modal-overlay" id="memoModal">
        <div class="modal-box">
            <h3 id="memoModalTitle"><i class="fas fa-pen"></i> 新增備忘項目</h3>
            <label>項目名稱</label>
            <input id="memoName" placeholder="例如：年度報告" />
            <label>進度</label>
            <select id="memoProgress">
                <option value="未完成">未完成 (綠色)</option>
                <option value="已完成">已完成 (紅色)</option>
            </select>
            <label>備註 <span style="color:#b33;font-weight:400;">(未完成時必填)</span></label>
            <input id="memoNote" placeholder="備註內容" />
            <label>狀態</label>
            <select id="memoStatus">
                <option value="正常">正常</option>
                <option value="緊急">緊急</option>
            </select>
            <div class="modal-actions">
                <button id="memoModalCancel">取消</button>
                <button class="btn-primary" id="memoModalSave">儲存</button>
            </div>
        </div>
    </div>

    <!-- 模態框：工作進度 -->
    <div class="modal-overlay" id="progressModal">
        <div class="modal-box">
            <h3><i class="fas fa-tasks"></i> 新增工作進度</h3>
            <label>部門</label>
            <select id="progressDept"></select>
            <label>項目</label>
            <input id="progressProject" placeholder="項目名稱" />
            <label>進度 (月份)</label>
            <input id="progressMonth" type="month" />
            <label>備註</label>
            <input id="progressNote" placeholder="備註" />
            <div class="modal-actions">
                <button id="progressModalCancel">取消</button>
                <button class="btn-primary" id="progressModalSave">儲存</button>
            </div>
        </div>
    </div>

    <!-- 模態框：刪除 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">
            <h3><i class="fas fa-trash-alt"></i> 刪除項目</h3>
            <p style="color:#4d5f78;">請輸入刪除密碼</p>
            <input type="password" id="deletePassword" placeholder="密碼" style="width:100%; padding:12px; border-radius:30px; border:1px solid #d4dce8;" />
            <div class="modal-actions">
                <button id="deleteModalCancel">取消</button>
                <button class="btn-primary" id="deleteModalConfirm">確認刪除</button>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        //  設定
        // ================================================================
        const GITHUB_USER = 'althellobye';
        const GITHUB_REPO = 'FHAC';
        const DATA_FILE = 'data.json';
        const BRANCH = 'main';
        const DEPARTMENTS = ['總會', '創藝', '寶利', '康盈', '怡樂', '朗程', '寶翠', '心悅', '喜悅', '欣悅', '樂膳'];
        const DELETE_PASSWORD = 'yuki';

        // ================================================================
        //  全域狀態
        // ================================================================
        let currentMode = 'memo';
        let currentDept = '總會';
        let deleteTarget = null;
        let editTarget = null;
        let githubToken = '';

        let memoData = {};
        let progressData = [];

        const $ = (id) => document.getElementById(id);
        const tokenInput = $('tokenInput');
        const tokenStatus = $('tokenStatus');
        const loadBtn = $('loadTokenBtn');

        const memoSection = $('memoSection');
        const progressSection = $('progressSection');
        const deptTabsEl = $('deptTabs');
        const memoCardGrid = $('memoCardGrid');
        const deptSummary = $('deptSummary');
        const progressGrid = $('progressGrid');

        const addMemoBtn = $('addMemoBtn');
        const addProgressBtn = $('addProgressBtn');

        const memoModal = $('memoModal');
        const progressModal = $('progressModal');
        const deleteModal = $('deleteModal');

        const memoName = $('memoName');
        const memoProgress = $('memoProgress');
        const memoNote = $('memoNote');
        const memoStatus = $('memoStatus');
        const progressDept = $('progressDept');
        const progressProject = $('progressProject');
        const progressMonth = $('progressMonth');
        const progressNote = $('progressNote');
        const deletePassword = $('deletePassword');

        // ================================================================
        //  工具函數
        // ================================================================
        function genId() {
            return Date.now().toString(36) + Math.random().toString(36).substring(2, 6);
        }

        function setStatus(text, type = '') {
            tokenStatus.innerHTML = text;
            tokenStatus.className = 'token-status' + (type ? ' ' + type : '');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ================================================================
        //  GitHub API
        // ================================================================
        async function fetchDataFromGitHub(token) {
            const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FILE}?ref=${BRANCH}`;
            const resp = await fetch(url, {
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                }
            });
            if (!resp.ok) {
                if (resp.status === 404) return null;
                const err = await resp.json().catch(() => ({}));
                throw new Error(`GitHub API 錯誤 (${resp.status}): ${err.message || resp.statusText}`);
            }
            const data = await resp.json();
            const binary = atob(data.content);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            const text = new TextDecoder('utf-8').decode(bytes);
            return { sha: data.sha, content: JSON.parse(text) };
        }

        async function saveDataToGitHub(token, data, sha) {
            const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FILE}?ref=${BRANCH}`;
            const jsonStr = JSON.stringify(data, null, 2);
            const encoder = new TextEncoder();
            const bytes = encoder.encode(jsonStr);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            const content = btoa(binary);
            const payload = { message: `更新資料 ${new Date().toLocaleString()}`, content, branch: BRANCH };
            if (sha) payload.sha = sha;
            const resp = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload),
            });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(`儲存失敗 (${resp.status}): ${err.message || resp.statusText}`);
            }
            const result = await resp.json();
            return result.content.sha;
        }

        // ================================================================
        //  核心資料載入 / 儲存
        // ================================================================
        async function loadData(token) {
            setStatus('<i class="fas fa-spinner fa-pulse"></i> 載入中...', 'loading');
            try {
                const result = await fetchDataFromGitHub(token);
                if (result === null) {
                    memoData = {};
                    DEPARTMENTS.forEach(d => { memoData[d] = []; });
                    progressData = [];
                    setStatus('<i class="fas fa-file"></i> 新檔案已建立', '');
                    await saveAllData(token);
                } else {
                    const parsed = result.content;
                    memoData = parsed.memoData || {};
                    progressData = parsed.progressData || [];
                    DEPARTMENTS.forEach(d => {
                        if (!memoData[d]) memoData[d] = [];
                    });
                    const total = Object.values(memoData).reduce((a, b) => a + b.length, 0) + progressData.length;
                    setStatus(`<i class="fas fa-check-circle"></i> 已載入 (${total} 項)`, '');
                }
                refreshAll();
            } catch (err) {
                console.error(err);
                setStatus(`<i class="fas fa-exclamation-circle"></i> ${err.message}`, 'error');
            }
        }

        async function saveAllData(token) {
            const fullData = { memoData, progressData, updatedAt: new Date().toISOString() };
            try {
                const result = await fetchDataFromGitHub(token);
                const sha = result ? result.sha : null;
                await saveDataToGitHub(token, fullData, sha);
                setStatus(`<i class="fas fa-check-circle"></i> 已儲存 (${new Date().toLocaleTimeString()})`, '');
                return true;
            } catch (err) {
                console.error(err);
                setStatus(`<i class="fas fa-exclamation-circle"></i> 儲存失敗: ${err.message}`, 'error');
                return false;
            }
        }

        // ================================================================
        //  渲染函數
        // ================================================================
        function renderDeptTabs() {
            deptTabsEl.innerHTML = '';
            DEPARTMENTS.forEach(dept => {
                const count = (memoData[dept] || []).length;
                const btn = document.createElement('button');
                btn.className = `dept-tab ${dept === currentDept ? 'active' : ''}`;
                btn.innerHTML = `${dept} <span class="count-badge">${count}</span>`;
                btn.dataset.dept = dept;
                btn.addEventListener('click', () => {
                    currentDept = dept;
                    renderDeptTabs();
                    renderMemoCards();
                });
                deptTabsEl.appendChild(btn);
            });
        }

        function renderMemoCards() {
            const items = memoData[currentDept] || [];
            const total = items.length;
            deptSummary.innerHTML = `<i class="fas fa-list-ul"></i> 總計 ${total} 項`;
            if (total === 0) {
                memoCardGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#7a8aa0; padding:40px 0;">暫無項目，點「新增項目」添加</div>`;
                return;
            }
            let html = '';
            items.forEach(item => {
                const progClass = item.progress === '已完成' ? 'badge-red' : 'badge-green';
                const statClass = item.status === '緊急' ? 'badge-urgent' : 'badge-normal';
                html += `
                    <div class="task-card" data-id="${item.id}">
                        <div class="card-title">${escapeHtml(item.name)}</div>
                        <div class="card-meta">
                            <span class="badge-progress ${progClass}">${item.progress}</span>
                            <span class="badge-progress ${statClass}">${item.status}</span>
                            ${item.note ? `<span style="font-size:0.8rem; color:#4a6885;"><i class="far fa-sticky-note"></i> ${escapeHtml(item.note)}</span>` : ''}
                        </div>
                        <div class="card-actions">
                            <button class="edit-btn" data-id="${item.id}"><i class="fas fa-edit"></i> 編輯</button>
                            <button class="delete-btn" data-id="${item.id}" data-type="memo"><i class="fas fa-trash"></i> 刪除</button>
                        </div>
                    </div>
                `;
            });
            memoCardGrid.innerHTML = html;
            memoCardGrid.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    deleteTarget = { type: 'memo', id: btn.dataset.id };
                    deleteModal.classList.add('show');
                    deletePassword.value = '';
                });
            });
            memoCardGrid.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    const item = (memoData[currentDept] || []).find(i => i.id === id);
                    if (item) {
                        editTarget = { dept: currentDept, item };
                        memoName.value = item.name || '';
                        memoProgress.value = item.progress || '未完成';
                        memoNote.value = item.note || '';
                        memoStatus.value = item.status || '正常';
                        $('memoModalTitle').innerHTML = '<i class="fas fa-edit"></i> 編輯備忘項目';
                        memoModal.classList.add('show');
                    }
                });
            });
        }

        function renderProgress() {
            if (progressData.length === 0) {
                progressGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#7a8aa0; padding:40px 0;">暫無工作進度記錄</div>`;
                return;
            }
            let html = '';
            progressData.forEach(item => {
                html += `
                    <div class="work-card">
                        <div class="wp-dept"><i class="fas fa-building"></i> ${escapeHtml(item.dept)}</div>
                        <div class="wp-project"><strong>${escapeHtml(item.project)}</strong></div>
                        <div class="wp-meta"><i class="far fa-calendar-alt"></i> ${escapeHtml(item.month)} ${item.note ? '· '+escapeHtml(item.note) : ''}</div>
                        <div class="card-actions">
                            <button class="delete-btn" data-id="${item.id}" data-type="progress"><i class="fas fa-trash"></i> 刪除</button>
                        </div>
                    </div>
                `;
            });
            progressGrid.innerHTML = html;
            progressGrid.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    deleteTarget = { type: 'progress', id: btn.dataset.id };
                    deleteModal.classList.add('show');
                    deletePassword.value = '';
                });
            });
        }

        function refreshAll() {
            if (currentMode === 'memo') {
                renderDeptTabs();
                renderMemoCards();
            } else {
                renderProgress();
            }
            progressDept.innerHTML = '';
            DEPARTMENTS.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d;
                opt.textContent = d;
                progressDept.appendChild(opt);
            });
            progressDept.value = currentDept;
            if (!progressMonth.value) {
                progressMonth.value = new Date().toISOString().slice(0, 7);
            }
        }

        // ================================================================
        //  事件綁定
        // ================================================================
        document.querySelectorAll('.mode-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentMode = this.dataset.mode;
                memoSection.classList.toggle('hidden', currentMode !== 'memo');
                progressSection.classList.toggle('hidden', currentMode !== 'progress');
                refreshAll();
            });
        });

        // 新增備忘錄
        addMemoBtn.addEventListener('click', () => {
            editTarget = null;
            memoName.value = '';
            memoProgress.value = '未完成';
            memoNote.value = '';
            memoStatus.value = '正常';
            $('memoModalTitle').innerHTML = '<i class="fas fa-pen"></i> 新增備忘項目';
            memoModal.classList.add('show');
        });
        $('memoModalCancel').addEventListener('click', () => memoModal.classList.remove('show'));
        $('memoModalSave').addEventListener('click', async () => {
            const name = memoName.value.trim();
            if (!name) { alert('請輸入項目名稱'); return; }
            const progress = memoProgress.value;
            const note = memoNote.value.trim();
            const status = memoStatus.value;
            if (progress === '未完成' && !note) { alert('未完成項目必須填寫備註'); return; }
            if (editTarget) {
                const idx = memoData[editTarget.dept].findIndex(i => i.id === editTarget.item.id);
                if (idx !== -1) {
                    memoData[editTarget.dept][idx] = { ...memoData[editTarget.dept][idx], name, progress, note: note || '', status };
                }
                editTarget = null;
            } else {
                if (!memoData[currentDept]) memoData[currentDept] = [];
                memoData[currentDept].push({ id: genId(), name, progress, note: note || '', status });
            }
            memoModal.classList.remove('show');
            await saveAllData(githubToken);
            renderDeptTabs();
            renderMemoCards();
        });

        // 新增工作進度
        addProgressBtn.addEventListener('click', () => {
            progressDept.value = currentDept;
            progressProject.value = '';
            progressMonth.value = new Date().toISOString().slice(0, 7);
            progressNote.value = '';
            progressModal.classList.add('show');
        });
        $('progressModalCancel').addEventListener('click', () => progressModal.classList.remove('show'));
        $('progressModalSave').addEventListener('click', async () => {
            const dept = progressDept.value;
            const project = progressProject.value.trim();
            const month = progressMonth.value;
            const note = progressNote.value.trim();
            if (!dept || !project || !month) { alert('請填寫完整資訊'); return; }
            progressData.push({ id: genId(), dept, project, month, note });
            progressModal.classList.remove('show');
            await saveAllData(githubToken);
            renderProgress();
        });

        // 刪除
        $('deleteModalCancel').addEventListener('click', () => {
            deleteModal.classList.remove('show');
            deleteTarget = null;
        });
        $('deleteModalConfirm').addEventListener('click', async () => {
            if (deletePassword.value.trim() !== DELETE_PASSWORD) { alert('密碼錯誤'); return; }
            if (!deleteTarget) return;
            if (deleteTarget.type === 'memo') {
                for (let dept in memoData) {
                    memoData[dept] = memoData[dept].filter(item => item.id !== deleteTarget.id);
                }
                await saveAllData(githubToken);
                renderDeptTabs();
                renderMemoCards();
            } else if (deleteTarget.type === 'progress') {
                progressData = progressData.filter(item => item.id !== deleteTarget.id);
                await saveAllData(githubToken);
                renderProgress();
            }
            deleteModal.classList.remove('show');
            deleteTarget = null;
        });

        // 載入按鈕
        loadBtn.addEventListener('click', async () => {
            const token = tokenInput.value.trim();
            if (!token) { setStatus('<i class="fas fa-exclamation-circle"></i> 請輸入 Token', 'error'); return; }
            if (!token.startsWith('ghp_') && !token.startsWith('github_pat_')) {
                setStatus('<i class="fas fa-exclamation-circle"></i> Token 格式不對', 'error');
                return;
            }
            githubToken = token;
            await loadData(token);
        });

        tokenInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loadBtn.click();
        });

        // ================================================================
        //  初始化
        // ================================================================
        refreshAll();
        setStatus('<i class="fas fa-info-circle"></i> 請輸入 Token 後載入', '');
        console.log('✅ FHAC 看板已載入');
        console.log(`📁 資料將儲存在: ${GITHUB_USER}/${GITHUB_REPO}/${DATA_FILE}`);
        console.log('🔑 請輸入您的 GitHub Token 後點擊「載入資料」');
    </script>
</body>
</html>
